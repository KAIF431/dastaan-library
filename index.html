<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dastaan • Sukoon-e-Dil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-green: #032219;
            --vintage-gold: #c5a059;
            --soft-cream: #f4eee0;
        }
        body {
            margin: 0;
            font-family: 'Merriweather', serif;
            color: var(--soft-cream);
            height: 100vh;
            overflow: hidden;
            cursor: none;
            background: radial-gradient(circle at center, #032219, #1a2a24);
            animation: bgShift 18s ease infinite alternate;
        }
        @keyframes bgShift {
            0% { background: radial-gradient(circle at center, #032219, #1a2a24); }
            100% { background: radial-gradient(circle at center, #0f1f1a, #1a2a24); }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Light Follow Effect */
        .light {
            position: fixed;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(197,160,89,0.18), transparent);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            mix-blend-mode: screen;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(3,34,25,0.6);
            animation: reveal 2.2s forwards;
            z-index: 2;
        }
        @keyframes reveal {
            to { opacity: 0; visibility: hidden; }
        }

        /* Nav */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 25px 50px;
            position: relative;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 2.5s forwards;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--vintage-gold);
        }

        /* Hero */
        .hero {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 92px;
            line-height: 1.05;
            margin-bottom: 20px;
            color: white;
            opacity: 0;
            animation: fadeUp 2s forwards, glow 4s infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(197,160,89,0.4); }
            to { text-shadow: 0 0 40px rgba(197,160,89,0.7); }
        }

        .tagline {
            font-style: italic;
            font-size: 21px;
            max-width: 680px;
            margin: 0 auto 50px;
            border-right: 2px solid var(--vintage-gold);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 4.5s steps(70, end) forwards, blink 0.8s infinite;
            animation-delay: 1.2s;
        }
        @keyframes typing {
            to { width: 100%; }
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        .btn {
            margin-top: 30px;
            padding: 16px 42px;
            border: 2px solid var(--vintage-gold);
            color: var(--vintage-gold);
            text-decoration: none;
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            letter-spacing: 2px;
            transition: all 0.5s ease;
            opacity: 0;
            animation: fadeUp 2s forwards;
            animation-delay: 3.2s;
        }
        .btn:hover {
            background: var(--vintage-gold);
            color: var(--deep-green);
            transform: scale(1.08);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <canvas id="particles"></canvas>
    <div class="light" id="light"></div>

    <nav>
        <div class="logo">Dastaan</div>
    </nav>

    <section class="hero">
        <h1>Dastoor-e-Dastaan</h1>
        <p class="tagline">
            Mohabbat, imaan aur tabdeeli ke raste, jo rooh ko badal de...
        </p>
        <a href="allnovel.html" class="btn" onclick="goNext(event)">Start Reading →</a>
    </section>

    <footer style="position:absolute; bottom:20px; width:100%; text-align:center; font-size:13px; color:#c5a05999;">
        © 2025 | Dastaan Sukoon-e-Dil
    </footer>

    <script>
        // Light Follow Effect
        const light = document.getElementById("light");
        document.addEventListener("mousemove", (e) => {
            light.style.left = e.clientX + "px";
            light.style.top = e.clientY + "px";
        });

        // Page Transition
        function goNext(e) {
            e.preventDefault();
            document.body.style.transition = "opacity 0.9s ease";
            document.body.style.opacity = "0";
            setTimeout(() => {
                window.location.href = "index.html";
            }, 900);
        }

        // Particles Background (kept cinematic feel)
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for (let i = 0; i < 90; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2.2 + 0.8,
                speed: Math.random() * 0.6 + 0.25
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speed;
                if (p.y > canvas.height) {
                    p.y = 0;
                    p.x = Math.random() * canvas.width;
                }
                ctx.fillStyle = "rgba(197, 160, 89, 0.25)";
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
